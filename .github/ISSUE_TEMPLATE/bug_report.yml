name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        **Do not use this form for security vulnerabilities** — see [SECURITY.md](../../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: "When I run `agent-loop run --dry-run --org test-org`, the assessor returns an empty gap_analysis.json..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or tracebacks.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      multiple: true
      options:
        - agent-loop (harness/loop.py)
        - tools dispatcher (harness/tools.py)
        - sfdc-connect skill
        - workday-connect skill
        - oscal-assess skill
        - sscf-benchmark skill
        - nist-review skill
        - report-gen skill
        - oscal-gap-map script
        - memory (harness/memory.py)
        - Docker / docker-compose
        - CI / GitHub Actions
        - Other

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the tag you're running.
      placeholder: "e836898 / v0.3.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, Docker version.
      placeholder: |
        Python: 3.13.7
        OS: macOS 15.3 / Ubuntu 22.04
        Docker: 27.1.1
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (I would use the private reporting channel for that).
          required: true
        - label: I can reproduce this on the latest `main` branch.
          required: false
