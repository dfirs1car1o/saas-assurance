# NOTE: projectKey must match the key configured in SonarCloud.
# To complete the rename: go to SonarCloud → project Settings → Update Key → dfirs1car1o_saas-assurance
# Until then, keep this key as-is to avoid breaking CI analysis history.
sonar.projectKey=dfirs1car1o_saas-posture
sonar.organization=dfirs1car1o
sonar.host.url=https://sonarcloud.io

sonar.projectName=saas-assurance
sonar.projectVersion=1.0

# Source and test roots
sonar.sources=skills,harness,scripts
sonar.tests=tests
sonar.python.version=3.11

# Exclusions — generated artifacts, config data, docs
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  .venv/**,\
  docs/**,\
  config/**,\
  apex-scripts/**,\
  **/migrations/**

# Coverage — scripts are CLI entry points, memory.py uses external services
sonar.coverage.exclusions=\
  scripts/**,\
  harness/memory.py

# Coverage report produced by pytest-cov in the test job
sonar.python.coverage.reportPaths=coverage.xml
